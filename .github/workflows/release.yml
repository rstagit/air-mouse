# Builds Hand Mouse Control into a standalone, no-Python-required executable
# for Windows, macOS (Apple Silicon), and Linux, then publishes all three as
# assets on a single GitHub Release.
#
# Trigger:
#   - Push a tag like "v1.0.0"           -> builds and publishes automatically
#   - Run manually from the Actions tab  -> type the tag you want to release as
#
# No secrets need to be configured; this only uses the automatic GITHUB_TOKEN.
#
# Why one native runner per OS instead of cross-compiling from Linux:
#   PyInstaller cannot cross-compile, and mediapipe (a hard dependency) only
#   ships wheels for Windows (x86_64/arm64), macOS arm64 (Apple Silicon --
#   there is currently no Intel Mac wheel), and Linux x86_64. So each build
#   has to run natively on that exact platform.

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish as a release (e.g. v1.0.0)"
        required: true

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHON_VERSION: "3.12"
  MODEL_URL: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"

jobs:
  build:
    name: Build ${{ matrix.platform_tag }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform_tag: linux-x86_64
            bin_name: HandMouseControl
          - os: windows-latest
            platform_tag: windows-x86_64
            bin_name: HandMouseControl.exe
          - os: macos-latest
            platform_tag: macos-arm64
            bin_name: HandMouseControl

    env:
      ASSET_NAME: HandMouseControl-${{ matrix.platform_tag }}.zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements.txt

      # pyautogui (via the mouseinfo package) connects to a display the
      # moment it's imported, and on Linux that means a real or virtual X
      # server must already exist -- otherwise even `import pyautogui`
      # raises KeyError: 'DISPLAY'. python3-tk is a separate, also-required
      # runtime dependency of pyautogui on Linux. opencv needs libGL.
      # Windows/macOS runners already run with a real desktop session, so
      # none of this is needed there.
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            python3-tk python3-dev xvfb libgl1 libglib2.0-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pyinstaller

      - name: Run test suite (Linux, under a virtual display)
        if: runner.os == 'Linux'
        run: xvfb-run -a python -m pytest tests/ -q

      - name: Run test suite
        if: runner.os != 'Linux'
        run: python -m pytest tests/ -q

      # --collect-all mediapipe is required: mediapipe ships its own data
      # files that PyInstaller cannot discover through normal import analysis
      # (confirmed in the project's own README build notes).
      - name: Build standalone executable
        shell: bash
        run: |
          ICON_ARG=""
          if [ "$RUNNER_OS" = "Windows" ] && [ -f app.ico ]; then
            ICON_ARG="--icon=app.ico"
          elif [ "$RUNNER_OS" = "macOS" ] && [ -f app.icns ]; then
            ICON_ARG="--icon=app.icns"
          fi
          pyinstaller --onefile --name HandMouseControl \
            --collect-all mediapipe $ICON_ARG hand_mouse_control.py
          chmod +x "dist/${{ matrix.bin_name }}"

      # Catches a build that "succeeds" but is actually broken at runtime
      # (e.g. missing mediapipe data files) before it ever reaches a release.
      - name: Smoke-test the built executable
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            xvfb-run -a "dist/${{ matrix.bin_name }}" --list-cameras
          else
            "dist/${{ matrix.bin_name }}" --list-cameras
          fi

      # Bundles the hand-landmark model together with the executable so the
      # first run doesn't need internet access (see README, "Build exe"
      # section, tip 5 -- this just automates that manual suggestion).
      - name: Package release archive
        shell: bash
        run: |
          mkdir -p package
          cp "dist/${{ matrix.bin_name }}" package/
          curl -L --fail --show-error -o package/hand_landmarker.task "$MODEL_URL"
          [ -f README.md ] && cp README.md package/
          [ -f LICENSE ] && cp LICENSE package/
          (cd package && zip -r "../$ASSET_NAME" .)

      # archive: false uploads the zip as-is (no zip-inside-a-zip), and makes
      # the artifact's stored name the file's own name -- so `name:` below
      # is intentionally omitted.
      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          path: ${{ env.ASSET_NAME }}
          if-no-files-found: error
          archive: false

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # workflow_dispatch runs carry the tag in `inputs.tag`; tag-push runs
      # carry it in `github.ref_name`. Exactly one of the two is set, and
      # `&&` / `||` here is GitHub Actions' usual stand-in for a ternary.
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Download all platform archives
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          pattern: "HandMouseControl-*"
          merge-multiple: true

      - name: List downloaded assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$RELEASE_TAG" release-assets/*.zip \
            --repo "${{ github.repository }}" \
            --title "Hand Mouse Control $RELEASE_TAG" \
            --generate-notes
